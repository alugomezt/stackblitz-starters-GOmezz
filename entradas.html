    <h2>Tus datos</h2>
      <form action="#">
<label for="fornombre">Nombre</label>
<input type="text" name="fornombre" id="fornombre" maxlength="30" minlength="3" required 
placeholder="ingrese su nombre" >

<input type="text" name="forapellido" id="forapellido" maxlength="30" minlength="3" required

<input id="formclave" required type="password"  placeholder="ingrese su palabra secreta">

<label for="fem">Femenino</label><br>

<label for="n">No Decirlo</label><br> <br>
<label for="">Seleccione su ubicacion</label><br>
  <select name="ubicacion" id="fromubi"></select>

</select>


<input type="submit">
